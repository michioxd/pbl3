name: Frontend build

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  build-prod:
    runs-on: ubuntu-latest
    environment: frontend

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Create .env
        working-directory: ./web
        run: |
          echo VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" > .env
          echo VITE_GOOGLE_CLIENT_ID="${{ vars.VITE_GOOGLE_CLIENT_ID }}" >> .env

      - name: Install dependencies
        run: bun i
        working-directory: ./web

      - name: Compile frontend
        run: bun run build
        working-directory: ./web

      - name: Add neccessary files for gh-pages
        run: |
          echo "/* /index.html 200" > ./web/dist/_headers
          cp ./web/dist/index.html ./web/dist/404.html
          echo "pbl3-prod.michioxd.ch" > ./web/dist/CNAME

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist